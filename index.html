<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #e0eaff 0%, #c7d9ff 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      .page-title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #1b96ff;
        margin-bottom: 10px;
      }

      .page-heading {
        font-size: 32px;
        font-weight: 700;
        color: #111;
        margin-bottom: 6px;
        text-align: center;
      }

      .page-sub {
        font-size: 15px;
        color: #666;
        margin-bottom: 30px;
        text-align: center;
      }

      .form-card {
        max-width: 520px;
        width: 100%;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(27, 150, 255, 0.12);
        padding: 36px 32px 32px;
      }

      .form-card form label {
        font-weight: 600;
        font-size: 13px;
        display: block;
        margin-bottom: 6px;
        color: #444;
        letter-spacing: 0.3px;
      }

      .form-card form input[type="text"],
      .form-card form input[type="email"],
      .form-card form select {
        width: 100%;
        padding: 12px 14px;
        border-radius: 8px;
        border: 1.5px solid #d0d0d0;
        font-size: 14px;
        font-family: inherit;
        color: #222;
        background: #fafafa;
        transition:
          border-color 0.25s,
          box-shadow 0.25s;
        outline: none;
      }

      .form-card form input:focus,
      .form-card form select:focus {
        border-color: #1b96ff;
        box-shadow: 0 0 0 3px rgba(27, 150, 255, 0.12);
        background: #fff;
      }

      .form-card form .field {
        margin-bottom: 18px;
      }

      .form-row {
        display: flex;
        gap: 16px;
      }

      .form-row .field {
        flex: 1;
      }

      .required-star {
        color: #e84040;
        margin-left: 2px;
      }

      .form-card form button[type="submit"] {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #1b96ff, #0073e6);
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 8px;
        letter-spacing: 0.5px;
        transition:
          opacity 0.2s,
          transform 0.1s;
        box-shadow: 0 4px 14px rgba(27, 150, 255, 0.35);
      }

      .form-card form button[type="submit"]:hover {
        opacity: 0.92;
        transform: translateY(-1px);
      }

      .form-card form button[type="submit"]:active {
        transform: translateY(0);
      }

      .footer-note {
        font-size: 13px;
        color: #999;
        text-align: center;
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <p class="page-title">Get in Touch</p>
    <h1 class="page-heading">Contact Us</h1>
    <p class="page-sub">
      Fill out the form below and our team will reach out shortly.
    </p>

    <div class="form-card">
      <form
        action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00Dg5000005vWMr"
        method="POST"
      >
        <!-- Hidden Salesforce fields -->
        <input type="hidden" name="oid" value="00Dg5000005vWMr" />
        <!-- ⚠️ UPDATE THIS retURL to your GitHub Pages thankyou.html URL -->
        <input
          type="hidden"
          name="retURL"
          value="https://shubhamkumarcloud.github.io/submit-query/thankyou.html"
        />
        <input type="hidden" name="lead_source" value="Website" />

        <!-- First Name + Last Name side by side -->
        <div class="form-row">
          <div class="field">
            <label for="first_name">First Name</label>
            <input
              id="first_name"
              name="first_name"
              type="text"
              maxlength="40"
              placeholder="John"
            />
          </div>
          <div class="field">
            <label for="last_name"
              >Last Name <span class="required-star">*</span></label
            >
            <input
              id="last_name"
              name="last_name"
              type="text"
              maxlength="80"
              required
              placeholder="Doe"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="field">
          <label for="email">Email <span class="required-star">*</span></label>
          <input
            id="email"
            name="email"
            type="email"
            maxlength="80"
            required
            placeholder="john@example.com"
          />
        </div>

        <!-- Mobile -->
        <div class="field">
          <label for="mobile">Mobile</label>
          <input
            id="mobile"
            name="mobile"
            type="text"
            maxlength="40"
            placeholder="+91 98765 43210"
          />
        </div>

        <!-- City -->
        <div class="field">
          <label for="city">City</label>
          <input
            id="city"
            name="city"
            type="text"
            maxlength="40"
            placeholder="New Delhi"
          />
        </div>

        <!-- Country + State side by side -->
        <div class="form-row">
          <div class="field">
            <label for="country_code">Country</label>
            <select id="country_code" name="country_code">
              <option value="">Select Country</option>
              <option value="IN">India</option>
              <option value="US">United States</option>
              <option value="GB">United Kingdom</option>
              <option value="AE">UAE</option>
              <option value="AU">Australia</option>
            </select>
          </div>
          <div class="field">
            <label for="state_code">State</label>
            <select id="state_code" name="state_code">
              <option value="">Select State</option>
              <option value="DL">Delhi</option>
              <option value="HR">Haryana</option>
              <option value="UP">Uttar Pradesh</option>
              <option value="MH">Maharashtra</option>
              <option value="KA">Karnataka</option>
            </select>
          </div>
        </div>

        <button type="submit">Submit &rarr;</button>
      </form>
    </div>

    <p class="footer-note">
      🔒 Your information is safe with us. We never share your data.
    </p>
  </body>
</html>
